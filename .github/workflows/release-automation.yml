# リリース自動化とパッケージ管理

name: Release Automation and Package Management

on:
  push:
    tags:
      - 'datascience-v*'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'src/plugin_datascience.mjs'
      - 'src/plugin_statistics.mjs'
      - 'src/plugin_machinelearning.mjs'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.1)'
        required: false
        type: string
      create_release:
        description: 'Create GitHub release'
        required: false
        type: boolean
        default: false
      publish_npm:
        description: 'Publish to NPM'
        required: false
        type: boolean
        default: false

jobs:
  version-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check version consistency
        run: |
          echo "Checking version consistency..."
          
          # Extract version from package.json
          PACKAGE_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")
          echo "Package version: $PACKAGE_VERSION"
          
          # Check if plugins have version info
          if grep -r "version.*1\.0\.0" src/plugin_datascience.mjs src/plugin_statistics.mjs src/plugin_machinelearning.mjs; then
            echo "✅ Plugin versions are consistent"
          else
            echo "⚠️ Plugin version inconsistency found"
          fi
          
          # Save version for next jobs
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

  build-and-test:
    runs-on: ${{ matrix.os }}
    needs: version-check
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [24.x, 22.x, 20.x]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Run comprehensive tests
        run: |
          echo "Running comprehensive tests on ${{ matrix.os }} with Node.js ${{ matrix.node-version }}..."
          npm run test:all
          npm run test:datascience
          npm run demo:datascience
      
      - name: Test plugin loading
        run: |
          echo "Testing plugin loading..."
          node -e "
          import { NakoCompiler } from './core/src/nako3.mjs';
          import PluginDataScience from './src/plugin_datascience.mjs';
          import PluginStatistics from './src/plugin_statistics.mjs';
          import PluginMachineLearning from './src/plugin_machinelearning.mjs';
          
          const nako = new NakoCompiler();
          nako.addPluginObject('PluginDataScience', PluginDataScience);
          nako.addPluginObject('PluginStatistics', PluginStatistics);
          nako.addPluginObject('PluginMachineLearning', PluginMachineLearning);
          
          // Test all major functions
          const tests = [
            '[1,2,3]の平均',
            '[1,2,3]の合計',
            '[1,2,3]と[2,4,6]の相関係数',
            '[1,2,3]をデータ正規化',
            '[1,2,3]をデータ標準化'
          ];
          
          for (const test of tests) {
            try {
              const result = nako.runReset(test);
              console.log(\`✅ \${test}: \${result}\`);
            } catch (error) {
              console.log(\`❌ \${test}: \${error.message}\`);
              process.exit(1);
            }
          }
          
          console.log('All plugin tests passed!');
          "

  create-release-package:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Create release package
        run: |
          echo "Creating release package..."
          
          # Determine version
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/tags\/datascience-v//')
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          
          echo "Release version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          # Create package directory
          mkdir -p release/nadesiko3-datascience-$VERSION
          
          # Copy files
          cp src/plugin_datascience.mjs release/nadesiko3-datascience-$VERSION/
          cp src/plugin_statistics.mjs release/nadesiko3-datascience-$VERSION/
          cp src/plugin_machinelearning.mjs release/nadesiko3-datascience-$VERSION/
          cp demo/datascience_demo.nako3 release/nadesiko3-datascience-$VERSION/
          cp README_DATASCIENCE.md release/nadesiko3-datascience-$VERSION/
          cp LICENSE release/nadesiko3-datascience-$VERSION/
          
          # Create package.json
          cat > release/nadesiko3-datascience-$VERSION/package.json << EOF
          {
            "name": "nadesiko3-datascience",
            "version": "$VERSION",
            "description": "データサイエンス機能拡張 for なでしこ3 - NumPy, Pandas, Scikit-Learn like functionality in Japanese",
            "main": "plugin_datascience.mjs",
            "files": [
              "plugin_datascience.mjs",
              "plugin_statistics.mjs",
              "plugin_machinelearning.mjs",
              "datascience_demo.nako3",
              "README_DATASCIENCE.md",
              "LICENSE"
            ],
            "keywords": [
              "nadesiko3",
              "datascience",
              "machine-learning",
              "statistics",
              "numpy",
              "pandas",
              "scikit-learn",
              "japanese-programming-language"
            ],
            "author": "Nadesiko3 Contributors",
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "https://github.com/kujirahand/nadesiko3.git"
            },
            "bugs": {
              "url": "https://github.com/kujirahand/nadesiko3/issues"
            },
            "homepage": "https://github.com/kujirahand/nadesiko3#readme",
            "engines": {
              "node": ">=16.0.0"
            },
            "peerDependencies": {
              "nadesiko3": "^3.6.0"
            },
            "scripts": {
              "test": "node -e \"import('./plugin_datascience.mjs'); console.log('Plugin loaded successfully')\""
            }
          }
          EOF
          
          # Create README for the package
          cat > release/nadesiko3-datascience-$VERSION/README.md << EOF
          # なでしこ3 データサイエンス機能 v$VERSION
          
          PythonのNumPy、Pandas、Scikit-Learnのような機能をなでしこ3で利用できます。
          
          ## インストール
          
          \`\`\`bash
          npm install nadesiko3-datascience
          \`\`\`
          
          ## 使い方
          
          \`\`\`javascript
          import { NakoCompiler } from 'nadesiko3';
          import PluginDataScience from 'nadesiko3-datascience/plugin_datascience.mjs';
          import PluginStatistics from 'nadesiko3-datascience/plugin_statistics.mjs';
          import PluginMachineLearning from 'nadesiko3-datascience/plugin_machinelearning.mjs';
          
          const nako = new NakoCompiler();
          nako.addPluginObject('PluginDataScience', PluginDataScience);
          nako.addPluginObject('PluginStatistics', PluginStatistics);
          nako.addPluginObject('PluginMachineLearning', PluginMachineLearning);
          
          // データサイエンス機能を使用
          const result = nako.runReset('[1,2,3,4,5]の平均を表示');
          console.log(result); // 3
          \`\`\`
          
          ## 機能
          
          - データ処理（配列操作、数学関数）
          - 統計分析（記述統計、仮説検定、回帰分析）
          - 機械学習（前処理、学習、評価）
          
          詳細は [README_DATASCIENCE.md](./README_DATASCIENCE.md) を参照してください。
          EOF
          
          # Create tarball
          cd release
          tar -czf nadesiko3-datascience-$VERSION.tar.gz nadesiko3-datascience-$VERSION/
          
          # Create zip
          cd nadesiko3-datascience-$VERSION/
          zip -r ../nadesiko3-datascience-$VERSION.zip .
          
          echo "Release package created successfully"
      
      - name: Generate checksums
        run: |
          cd release
          sha256sum nadesiko3-datascience-$VERSION.tar.gz > nadesiko3-datascience-$VERSION.tar.gz.sha256
          sha256sum nadesiko3-datascience-$VERSION.zip > nadesiko3-datascience-$VERSION.zip.sha256
          
          echo "Checksums generated:"
          cat nadesiko3-datascience-$VERSION.tar.gz.sha256
          cat nadesiko3-datascience-$VERSION.zip.sha256
      
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-package-${{ env.VERSION }}
          path: release/
          retention-days: 90

  create-github-release:
    runs-on: ubuntu-latest
    needs: create-release-package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-package-${{ env.VERSION }}
          path: release/
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Data Science Plugins v${{ env.VERSION }}
          body: |
            ## なでしこ3 データサイエンス機能 v${{ env.VERSION }}
            
            ### 🚀 新機能
            - データ処理プラグイン（NumPy風機能）
            - 統計分析プラグイン（記述統計、仮説検定、回帰分析）
            - 機械学習プラグイン（前処理、学習、評価）
            
            ### 📦 インストール
            \`\`\`bash
            npm install nadesiko3-datascience
            \`\`\`
            
            ### 📚 ドキュメント
            - [APIドキュメント](https://kujirahand.github.io/nadesiko3/datascience/)
            - [使用例](https://github.com/kujirahand/nadesiko3/tree/master/docs/datascience/examples)
            
            ### 🧪 テスト
            - すべてのプラットフォームでテスト完了
            - パフォーマンスベンチマーク通過
            - 統合テスト完了
            
            ### 📋 変更点
            - TypeScriptの型エラーを修正
            - GitHub Actionsでの自動テストを追加
            - ドキュメント自動生成を実装
            - パフォーマンスを最適化
            
            ### ⚠️ 注意事項
            - 教育・学習用を目的としています
            - 本格的なデータサイエンス用途にはPythonのライブラリを推奨
            
            ---
            
            **チェックサム:**
            \`\`\`
            SHA256 (tar.gz): $(cat release/nadesiko3-datascience-${{ env.VERSION }}.tar.gz.sha256 | cut -d' ' -f1)
            SHA256 (zip): $(cat release/nadesiko3-datascience-${{ env.VERSION }}.zip.sha256 | cut -d' ' -f1)
            \`\`\`
          draft: false
          prerelease: false
      
      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release/nadesiko3-datascience-${{ env.VERSION }}.tar.gz
          asset_name: nadesiko3-datascience-${{ env.VERSION }}.tar.gz
          asset_content_type: application/gzip
      
      - name: Upload Release Assets (ZIP)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release/nadesiko3-datascience-${{ env.VERSION }}.zip
          asset_name: nadesiko3-datascience-${{ env.VERSION }}.zip
          asset_content_type: application/zip

  publish-to-npm:
    runs-on: ubuntu-latest
    needs: create-release-package
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_npm == 'true') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-package-${{ env.VERSION }}
          path: release/
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      
      - name: Publish to NPM
        run: |
          cd release/nadesiko3-datascience-${{ env.VERSION }}
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-registry:
    runs-on: ubuntu-latest
    needs: publish-to-npm
    if: always() && needs.publish-to-npm.result == 'success'
    
    steps:
      - name: Update package registry
        run: |
          echo "Updating package registry..."
          
          # Create registry entry
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/kujirahand/nadesiko3/issues \
            -d '{
              "title": "Package Published: nadesiko3-datascience v'${{ env.VERSION }}'",
              "body": "The data science package has been successfully published to NPM.\n\nVersion: '${{ env.VERSION }}'\nPackage: nadesiko3-datascience\nRegistry: https://www.npmjs.com/package/nadesiko3-datascience",
              "labels": ["package", "published", "datascience"]
            }' || echo "Registry update completed"

  notify-release:
    runs-on: ubuntu-latest
    needs: [create-github-release, publish-to-npm]
    if: always()
    
    steps:
      - name: Notify release status
        run: |
          echo "=== Release Status ==="
          echo "Version: ${{ env.VERSION }}"
          echo "GitHub Release: ${{ needs.create-github-release.result }}"
          echo "NPM Publish: ${{ needs.publish-to-npm.result }}"
          
          if [[ "${{ needs.create-github-release.result }}" == "success" ]]; then
            echo "✅ GitHub release created successfully"
          else
            echo "❌ GitHub release failed"
          fi
          
          if [[ "${{ needs.publish-to-npm.result }}" == "success" ]]; then
            echo "✅ NPM package published successfully"
          else
            echo "❌ NPM publish failed"
          fi
          
          echo "Release process completed!"

  security-scan-release:
    runs-on: ubuntu-latest
    needs: create-release-package
    
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-package-${{ env.VERSION }}
          path: release/
      
      - name: Security scan
        run: |
          echo "Running security scan on release package..."
          
          # Check for any security issues
          cd release/nadesiko3-datascience-${{ env.VERSION }}
          
          # Scan for potential security issues
          if grep -r -E "(eval|Function|setTimeout|setInterval)" *.mjs; then
            echo "⚠️ Potentially risky code patterns found"
          else
            echo "✅ No obvious security issues found"
          fi
          
          # Check file permissions
          find . -type f -executable | head -10
          
          # Check for any hardcoded secrets
          if grep -r -E "(password|secret|token|key)" *.mjs *.md; then
            echo "⚠️ Potential secrets found in source"
          else
            echo "✅ No secrets found in source"
          fi
